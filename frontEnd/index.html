<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>EcoFuture | Ecosystem Analytics</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>EcoFuture</h1>
            <h2>A Predictive Examination of Your Ecosystem</h2>
        </header>

        <main>
            <form action="./analysis.html" method="GET" class="main-form">
                
                <div class="form-group">
                    <label for="locationInput">Location</label>
                    <div class="input-with-button">
                        <input type="text" id="locationInput" name="location" placeholder="Coordinates or city...">
                        <button type="button" id="detectLocationButton" class="detect-btn">Auto-Detect</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="animalInput">Target Species</label>
                    <input type="text" id="animalInput" name="animal" placeholder="e.g., Monarch Butterfly">
                </div>

                <div class="form-group">
                    <label for="timeframe">Prediction Range</label>
                    <input type="text" id="timeframe" name="timeframe" placeholder="e.g., 10 years ago to 20 years in the future OR 1951-2052">
                </div>

                <div class="action-buttons">
                    <button type="submit" id="submitButton" class="primary-Button">Analyze Future</button>
                </div>

            </form>
        </main>
    </div>

    <script src="js/location.js"></script>
</body>
</html>
