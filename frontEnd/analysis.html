<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Analysis</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>EcoFuture</h1>
            <h2>A Predictive Examination of Your Ecosystem</h2>
        </header>

        <div class="dashboard-body">
            <div class="metrics-column">
                <div class="form">
                    <label>Extinction Level Prediction:</label>
                    <label class="prediction-value">Not Evaluated</label> 
                </div>

                <div class="form">
                    <label for="whatIfSelect">What-If Scenarios:</label>
                    <select id="whatIfSelect" class="styled-select">
                        <option value="none">None</option>
                        <option value="virus">New Virus Appearing</option>
                        <option value="city_expansion">City Expansion</option>
                        <option value="drought">Drought</option>
                        <option value="pop_change">Sharp Increase/Decrease of Population</option>
                        <option value="side_effects">Side Effects</option>
                    </select>
                </div>

                <!-- <div class="form action-buttons"> ------------- Maybe implement later
                    <button class="primary-Button" id="btnExplainGraph">Explain Graph</button>
                    <button class="primary-Button" id="btnStabilize">How to Stabilize Ecosystem</button>
                </div> -->
            </div>

            <div style="width: 800px;">
                <canvas id="geminiChart"></canvas>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <script src="./js/chart.js"></script> <script src="./js/requestBackend.js"></script>
        </div>
    </div>
    <script src="./js/requestBackend.js"></script>
</body>
</html>
